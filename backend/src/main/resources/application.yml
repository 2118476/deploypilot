spring:
  application:
    name: deploypilot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

github:
  api:
    base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
    token: ${GITHUB_API_TOKEN:}

firebase:
  enabled: ${FIREBASE_ENABLED:false}

deploypilot:
  repo-access:
    # "github" uses the live GitHub API; "fixture" serves bundled sample
    # repositories for development and tests (no network, no credentials).
    mode: ${REPO_ACCESS_MODE:github}
  jwt:
    secret: ${JWT_SECRET:default-local-jwt-secret-change-in-production}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}
