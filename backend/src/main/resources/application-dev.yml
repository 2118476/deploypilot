spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/deploypilot}
    username: ${DATABASE_USERNAME:deploypilot}
    password: ${DATABASE_PASSWORD:localdev}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true

logging:
  level:
    com.deploypilot: DEBUG
    org.springframework.security: DEBUG
