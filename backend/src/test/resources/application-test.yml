spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

deploypilot:
  jwt:
    secret: test-only-jwt-secret-0123456789-0123456789-0123456789
  encryption:
    key: test-only-encryption-key-0123456789-0123456789
  repo-access:
    mode: fixture
  cors:
    allowed-origins: http://localhost:5173
  automation:
    execution-enabled: true
    confirmation-ttl-seconds: 600
    # Fast polling and loopback verification so tests never wait on real providers.
    poll-interval-ms: 20
    poll-max-attempts: 50
    verify-allow-local: true
